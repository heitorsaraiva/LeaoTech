<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 22 - Funções assíncronas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

</head>

<style>

</style>

<body style="margin-bottom: 500px;">
    <div class="container">
        <div class="row mt-5">
            <div class="col-12">
                <h1>Faça seu cadastro</h1>
            </div>
            <div class="col-6">
                <div>
                    <label for="nome">Nome: </label>
                    <input type="text" name="nome" id="nome">
                </div>
            </div>
            <div class="col-6">
                <label for="idade">Idade</label>
                <input type="text" name="idade" id="idade">
            </div>

            <div class="col-6">
                <div>
                    <label for="cep">CEP:</label>
                    <input oninput="getCEP()" type="text" name="cep" id="cep" maxlength="10">
                </div>
                <div>
                    <label for="cep">Rua:</label>
                    <input type="text" name="rua" id="rua">
                </div>
                <div>
                    <label for="cep">Complemento:</label>
                    <input type="text" name="complemento" id="complemento">
                </div>

            </div>
            <div class="col-6">
                <div>
                    <label for="cep">Cidade:</label>
                    <input type="text" name="cidade" id="cidade">
                </div>
                <div>
                    <label for="cep">Estado:</label>
                    <input type="text" name="estado" id="estado">
                </div>
                <div>
                    <label for="cep">Região:</label>
                    <input type="text" name="regiao" id="regiao">
                </div>
            </div>
        </div>
    </div>
    <button id="localizacao" class="btn btn-success mt-5" onclick="pedirLocalizacao()">Localização</button>
</body>

<script>
    function getCEP() {
        let inputCEP = document.getElementById('cep')
        let cep = inputCEP.value

        if (cep.length == 8) {
            let url = `https://viacep.com.br/ws/${cep}/json123/`

            fetch(url)
                .then((resp) => {
                    console.log((resp))
                    return resp.json()
                })
                .then((dados) => {
                    let inputRua = document.getElementById('rua')
                    console.log(dados)
                    inputRua.value = dados.logradouro
                    inputRua.setAttribute('disabled', 'disabled')

                    let inputComplemento = document.getElementById('complemento')
                    console.log(dados)
                    inputComplemento.value = dados.complemento
                    inputComplemento.setAttribute('disabled', 'disabled')

                    let inputCidade = document.getElementById('cidade')
                    console.log(dados)
                    inputCidade.value = dados.localidade
                    inputCidade.setAttribute('disabled', 'disabled')

                    let inputEstado = document.getElementById('estado')
                    console.log(dados)
                    inputEstado.value = dados.estado
                    inputEstado.setAttribute('disabled', 'disabled')

                    let inputRegiao = document.getElementById('regiao')
                    console.log(dados)
                    inputRegiao.value = dados.regiao
                    inputRegiao.setAttribute('disabled', 'disabled')
                })
                .catch((e) => {
                    console.log('erro')
                })

        }
    }

    let b = '2'

    try {
        console.log(b.toUppercase())
    } catch (cachorro) {
        console.log(`Deu erro!! o erro foi ${cachorro}`)
    }

    console.log('Olá mundo')

    function pedirLocalizacao() {
        let url = 'https://fakestoreapi.com/products'

        let produto = {
            oi:'olá'
        }

        fetch(url,{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify(produto)
        })
        .then((resp) => {
            console.log(resp.status)
            if( resp.status == 404){
                window.location.href = 'https://www.google.com'
            }
            
            return resp.json()
        })
        .then((dados) => {
            console.log(dados)
        })

    }

    


</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"

    crossorigin="anonymous"></script>

</html>
