<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h3>Formulário de Candidatura</h3>
    <br>
    <label for="">Nome:</label>
    <input type="text" name="nome" id="nome">
    <br><br>
    <label for="">Email:</label>
    <input type="email" name="email" id="email">
    <br><br>
    <label for="">Cargo de Tecnologia:</label>
    <select name="" id="">
            <option value="">Pessoa Desenvolvedora</option>
            <option value="opcao2">analista de sistemas</option> 
            <option value="opcao3">administrador(a) de banco de dados </option>
            <option value="opcao4">testador(a)</option>
        </select>
    <br><br>
    <label for="">Gênero:</label>    
    <input type="radio" name="genero" id="masculino" value="masculino">
    <label for="masculino">Masculino</label>
    <input type="radio" name="genero" id="feminino" value="feminino">
    <label for="feminino">Feminino</label>
    <input type="radio" name="genero" id="outro" value="outro">
    <label for="outro">Outro</label>
    <br><br>
    <label for="">Unidade de Interesse:</label>
    <input type="checkbox" name="unidade" id="unidade1" value="unidade1">
    <label for="unidade1">Fortaleza</label>

    <input type="checkbox" name="unidade" id="unidade2" value="unidade2">
    <label for="unidade2">Caucaia</label>

    <input type="checkbox" name="unidade" id="unidade3" value="unidade3">
    <label for="unidade3">Eusébio</label>
    <br><br>
    <label for="">Fale mais sobre você:</label><br>
    <textarea name="" id="" rows="5" cols="50" minlength="10" maxlength="200"></textarea>
    
    <br>
    <button type="submit">Enviar</button>

</body>
</html>
