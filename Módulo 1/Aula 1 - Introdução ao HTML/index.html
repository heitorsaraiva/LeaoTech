  <title>Aula 01</title>
  <body>
    <!-- Paragrafos, Titulos, Quebra de linhas -->
    <p>
      Lorem ipsum dolor sit amet consectetur adipisicing elit.<br />
      Cupiditate doloribus fugit quam.
    </p>
    <h1 class="parte-de-cima">Hello Word</h1>
    <h1>Utilizando h1</h1>
    <h2>Utilizando h2</h2>
    <h3>Utilizando h3</h3>
    <h4>Utilizando h4</h4>
    <h5>Utilizando h4</h5>
    <h6>Utilizando h4</h6>

    <!-- Listagens Ordened List, Unorded List +   type--> 
    <h1>Lista ul</h1>
    <ol type="A", start="2"> 
      <li>primeira</li>
      <li>segunda</li>
    </ol>
    <h1>Lista ol</h1> 
    <ul style="list-style: circle;">
      <li>primeira</li>
      <li>segunda</li>
    </ul>

  </body>

  <footer>Footer</footer>
